[versions]
spring-boot = "4.0.6"
spring-dependency-management = "1.1.7"
springdoc-openapi = "2.8.17"
langchain4j = "1.0.0-beta1"
corenlp = "4.5.10"
mlflow-client = "3.1.1"
djl = "0.33.0"

[libraries]
spring-boot-starter-webmvc = { module = "org.springframework.boot:spring-boot-starter-webmvc" }
spring-boot-starter-webmvc-test = { module = "org.springframework.boot:spring-boot-starter-webmvc-test" }
spring-boot-devtools = { module = "org.springframework.boot:spring-boot-devtools" }
spring-boot-configuration-processor = { module = "org.springframework.boot:spring-boot-configuration-processor" }
springdoc-openapi-scalar-ui = { module = "org.springdoc:springdoc-openapi-starter-webmvc-scalar", version.ref = "springdoc-openapi" }
langchain4j-core = { module = "dev.langchain4j:langchain4j", version.ref = "langchain4j" }
langchain4j-spring-boot-starter = { module = "dev.langchain4j:langchain4j-spring-boot-starter", version.ref = "langchain4j" }
langchain4j-open-ai-spring-boot-starter = { module = "dev.langchain4j:langchain4j-open-ai-spring-boot-starter", version.ref = "langchain4j" }
langchain4j-document-parser-apache-tika = { module = "dev.langchain4j:langchain4j-document-parser-apache-tika", version.ref = "langchain4j" }
corenlp = { module = "edu.stanford.nlp:stanford-corenlp", version.ref = "corenlp" }
corenlp-models = { module = "edu.stanford.nlp:stanford-corenlp", version.ref = "corenlp" }
mlflow-client = { module = "org.mlflow:mlflow-client", version.ref = "mlflow-client" }
djl-api = { module = "ai.djl:api", version.ref = "djl" }
djl-huggingface-tokenizers = { module = "ai.djl.huggingface:tokenizers", version.ref = "djl" }
djl-onnxruntime-engine = { module = "ai.djl.onnxruntime:onnxruntime-engine", version.ref = "djl" }
logback-classic = { module = "ch.qos.logback:logback-classic" }
lombok = { module = "org.projectlombok:lombok" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }

[plugins]
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }
